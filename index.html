<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    .status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.taken {
      cursor: default;
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .scores {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
    }

    .score-box .label { color: #888; font-size: 0.8rem; margin-bottom: 2px; }
    .score-box .value { font-size: 1.6rem; font-weight: bold; }
    .score-box.x .value { color: #e94560; }
    .score-box.o .value { color: #a8dadc; }
    .score-box.ties .value { color: #f0c040; }

    button {
      margin-top: 1.8rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }

    button:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div class="status" id="status">Player X's turn</div>

  <div class="board" id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <div class="scores">
    <div class="score-box x">
      <div class="label">Player X</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box ties">
      <div class="label">Ties</div>
      <div class="value" id="score-ties">0</div>
    </div>
    <div class="score-box o">
      <div class="label">Player O</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <button id="reset-btn">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diags
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      scores = scores || { X: 0, O: 0, ties: 0 };
      render();
    }

    function render() {
      const cells = document.querySelectorAll('.cell');
      cells.forEach((cell, i) => {
        cell.textContent = board[i] || '';
        cell.className = 'cell' + (board[i] ? ` taken ${board[i].toLowerCase()}` : '');
      });
      document.getElementById('status').textContent = gameOver
        ? ''
        : `Player ${current}'s turn`;
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-ties').textContent = scores.ties;
    }

    function checkWin() {
      return WINS.find(combo => combo.every(i => board[i] === current)) || null;
    }

    function handleClick(e) {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver) return;
      const idx = parseInt(cell.dataset.index);
      if (board[idx]) return;

      board[idx] = current;
      const winCombo = checkWin();

      if (winCombo) {
        gameOver = true;
        scores[current]++;
        render();
        winCombo.forEach(i => {
          document.querySelectorAll('.cell')[i].classList.add('win');
        });
        document.getElementById('status').textContent = `Player ${current} wins!`;
      } else if (board.every(Boolean)) {
        gameOver = true;
        scores.ties++;
        render();
        document.getElementById('status').textContent = "It's a tie!";
      } else {
        current = current === 'X' ? 'O' : 'X';
        render();
      }
    }

    document.getElementById('board').addEventListener('click', handleClick);
    document.getElementById('reset-btn').addEventListener('click', init);

    scores = { X: 0, O: 0, ties: 0 };
    init();
  </script>
</body>
</html>
